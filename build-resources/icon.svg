<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BA0E9"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <linearGradient id="doc" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1a3a6e" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Document icon -->
  <g filter="shadow" transform="translate(256,260) scale(1)">
    <path d="M-60,-100 L20,-100 L60,-60 L60,100 L-60,100 Z" fill="url(#doc)" opacity="0.95"/>
    <path d="M20,-100 L20,-60 L60,-60 Z" fill="#a8cef8" opacity="0.7"/>
    <!-- Text lines -->
    <line x1="-36" y1="-40" x2="36" y2="-40" stroke="#4A90D9" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="-36" y1="-12" x2="28" y2="-12" stroke="#4A90D9" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="-36" y1="16" x2="36" y2="16" stroke="#4A90D9" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
    <line x1="-36" y1="44" x2="20" y2="44" stroke="#4A90D9" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Sparkle accent -->
  <g filter="glow" transform="translate(340, 140)">
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="white" opacity="0.9"/>
  </g>
  <g transform="translate(370, 180)">
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="white" opacity="0.6"/>
  </g>
</svg>
